research_task:
  description: >
    Conduct thorough research about the company {customer_domain} and its
    market environment in the context of the project {project_description}.

    Your research should include:
    - Company overview and positioning
    - Target customers and demographics
    - Current market trends in 2026
    - Main competitors in the market
    - Opportunities or gaps in the market

    Use internet search results and extract useful insights instead of generic
    information.

  expected_output: >
    A detailed research report including:
    - Company overview
    - Customer demographics
    - Market trends
    - Competitor landscape
    - Key opportunities in the market


project_understanding_task:
  description: >
    Understand the project {project_description} and identify the ideal
    target audience.

    Analyze:
    - What the product does
    - Who would benefit from it
    - Their demographics
    - Their motivations and pain points
    - Their typical online behavior

  expected_output: >
    A clear summary of the product and a detailed target audience profile
    including demographics, psychographics, pain points, and goals.


marketing_strategy_task:
  description: >
    Create a comprehensive marketing strategy for the product
    {project_description} for the company {customer_domain}.

    The strategy must include:
    - Strategic marketing goals
    - Target audience
    - Brand positioning
    - Key messages
    - Marketing tactics
    - Marketing channels
    - Key performance indicators (KPIs)

    Focus on practical and actionable strategies.

  expected_output: >
    A structured marketing strategy document including goals,
    positioning, messaging, tactics, channels, and KPIs.


campaign_idea_task:
  description: >
    Develop creative marketing campaign ideas for the product
    {project_description}.

    Campaigns should:
    - Be innovative
    - Be engaging for the target audience
    - Align with the marketing strategy
    - Focus on increasing awareness and adoption

  expected_output: >
    A list of 5 marketing campaign ideas with descriptions,
    goals, and expected impact.


copy_creation_task:
  description: >
    Create compelling marketing copy for each campaign idea related to
    {project_description}.

    Ensure the copy is:
    - Persuasive
    - Clear
    - Tailored to the target audience
    - Suitable for marketing channels such as social media or ads.

  expected_output: >
    Marketing copy for each campaign including headline,
    description, and call-to-action.


growth_plan_task:
  description: >
    Create a detailed marketing growth plan for {project_description}.

    The plan must include:

    - Key market trends in 2026
    - Top competitors in the market
    - Competitor comparison
    - Trending SEO keywords related to the product
    - Best marketing channels to reach the audience
    - A 90-day marketing launch roadmap
    - Growth experiments to test

    For each competitor include:
    - Competitor name
    - Their product
    - Strength
    - Weakness
    - Market opportunity

    Focus on providing actionable insights rather than generic advice.

  expected_output: >
    A structured growth plan including competitor comparison,
    keyword opportunities, marketing channels, and a 90-day roadmap.


final_report_task:
  description: >
    Generate a professional AI marketing intelligence report using
    all outputs from the previous tasks.

    The report must contain the following sections:

    1. Executive Summary
    2. Market Insights
    3. Competitor Analysis (include strengths and weaknesses)
    4. Target Audience Personas
    5. SEO Keyword Opportunities
    6. Recommended Marketing Channels
    7. 90-Day Growth Plan
    8. Campaign Ideas
    9. Actionable Marketing Recommendations

    Requirements:
    - Avoid generic marketing advice.
    - Provide insights derived from research.
    - Clearly structure the report with headings.
    - Keep the report professional and concise.

  expected_output: >
    A complete AI marketing intelligence report summarizing all
    research insights, strategies, campaigns, and growth plans in
    a well-structured format.